<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Resumen del Club — Club Polideportivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { background: var(--bg); color: var(--ink); font-family: var(--font-ui); margin: 0; padding: 0; }
  .reporte-wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 60px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; }
  .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); margin-bottom: 6px; }
  .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; font-family: var(--font-display); }
  .talleres-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .talleres-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); border-bottom: 1px solid var(--line); background: var(--surface-2); }
  .talleres-table td { padding: 12px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .talleres-table tr:last-child td { border-bottom: 0; }
  .loading { text-align: center; padding: 80px 20px; color: var(--ink-3); font-size: 15px; }
  .error-msg { text-align: center; padding: 60px 20px; color: var(--absent, #e53e3e); font-size: 14px; }
  .section-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 14px; font-family: var(--font-display); }
  .club-header { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .club-logo { width: 56px; height: 56px; border-radius: 14px; background: var(--ink); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 20px; flex-shrink: 0; }
  .club-meta { font-size: 13px; color: var(--ink-3); margin-top: 4px; display: flex; gap: 14px; flex-wrap: wrap; }
  .footer { text-align: center; font-size: 12px; color: var(--ink-3); margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--line); }
  .emoji-cell { font-size: 20px; line-height: 1; }
</style>
</head>
<body data-palette="lima" data-density="comfortable">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3001/api'
  : '/api';

function App() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    fetch(API_BASE + '/public/report')
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError('No se pudo cargar el reporte. Intente más tarde.'); setLoading(false); });
  }, []);

  const now = new Date();
  const fechaGen = now.toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });

  if (loading) {
    return <div className="loading">Cargando resumen del club…</div>;
  }

  if (error || !data) {
    return <div className="error-msg">{error || 'Error al cargar datos'}</div>;
  }

  const { empresa, talleres, resumen } = data;

  return (
    <div className="reporte-wrap">
      {/* Club header */}
      <div className="club-header">
        <div className="club-logo">CP</div>
        <div>
          <h1 style={{ margin: '0 0 4px', fontSize: 24, fontWeight: 700, letterSpacing: '-0.02em', fontFamily: 'var(--font-display)' }}>
            {empresa?.nombre || 'Club Polideportivo'}
          </h1>
          <div className="club-meta">
            {empresa?.telefono && <span>📞 {empresa.telefono}</span>}
            {empresa?.email && <span>✉️ {empresa.email}</span>}
            {empresa?.direccion && <span>📍 {empresa.direccion}</span>}
            {empresa?.web && <span>🌐 {empresa.web}</span>}
          </div>
        </div>
      </div>

      {/* Stats */}
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-label">Socios activos</div>
          <div className="stat-value">{resumen.totalSocios}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Talleres disponibles</div>
          <div className="stat-value">{talleres.length}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Asistencia (30 días)</div>
          <div className="stat-value">{resumen.asistenciaPct}<span style={{ fontSize: 18, color: 'var(--ink-3)', fontWeight: 500 }}>%</span></div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Pagos del mes</div>
          <div className="stat-value">{resumen.pagosMes}</div>
        </div>
      </div>

      {/* Talleres */}
      <div style={{ background: 'var(--surface)', border: '1px solid var(--line)', borderRadius: 14, overflow: 'hidden', marginBottom: 24 }}>
        <div style={{ padding: '16px 18px', borderBottom: '1px solid var(--line)' }}>
          <div className="section-title">Talleres en curso</div>
        </div>
        {talleres.length === 0 ? (
          <div style={{ padding: 32, textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>
            No hay talleres registrados.
          </div>
        ) : (
          <table className="talleres-table">
            <thead>
              <tr>
                <th></th>
                <th>Taller</th>
                <th>Disciplina</th>
                <th>Horario</th>
                <th>Sede</th>
                <th>Profesor</th>
                <th style={{ textAlign: 'right' }}>Alumnos</th>
              </tr>
            </thead>
            <tbody>
              {talleres.map((t, i) => (
                <tr key={i}>
                  <td className="emoji-cell">{t.emoji || '🎯'}</td>
                  <td style={{ fontWeight: 600 }}>{t.nombre}</td>
                  <td style={{ color: 'var(--ink-2)' }}>{t.disciplina}</td>
                  <td style={{ color: 'var(--ink-3)', fontFamily: 'var(--font-mono)', fontSize: 12 }}>{t.horario || t.hora || '—'}</td>
                  <td style={{ color: 'var(--ink-3)', fontSize: 12 }}>{t.sede || '—'}</td>
                  <td style={{ color: 'var(--ink-2)', fontSize: 12 }}>{t.profesor_nombre || '—'}</td>
                  <td style={{ textAlign: 'right', fontWeight: 700, fontFamily: 'var(--font-mono)' }}>{t.alumnos}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      <div className="footer">
        Reporte generado el {fechaGen} · {empresa?.nombre || 'Club Polideportivo'}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
